name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    name: Build, attach bundle and validate HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Build the bundle
        run: |
          npm ci
          npm run update-version
          npm run build
      - name: Upload dist/sauna-card.js
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de # 2.11.5
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/sauna-card.js
          asset_name: sauna-card.js
          tag: ${{ github.event.release.tag_name }}
          overwrite: true
      # Enforce HACS plugin compliance now that the release asset exists. A
      # broken hacs.json or repository layout fails the release. Pinned to an
      # immutable SHA for reproducibility; bump deliberately to pick up new
      # HACS validation rules.
      - name: Validate HACS manifest & structure
        uses: hacs/action@dcb30e72781db3f207d5236b861172774ab0b485 # main @ 2026-06-04
        with:
          category: "plugin"
