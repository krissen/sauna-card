name: Release

on:
  release:
    types: [published]

jobs:
  release:
    name: Build and attach bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Build the bundle
        run: |
          npm ci
          npm run build
      - name: Upload dist/sauna-card.js
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/sauna-card.js
          asset_name: sauna-card.js
          tag: ${{ github.event.release.tag_name }}
          overwrite: true
