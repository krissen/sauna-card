name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    name: Build, attach bundle and validate HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      # Re-run the same quality gates as CI so a release can never ship a broken
      # bundle, even if cut from a commit that bypassed CI.
      - name: Quality gates
        run: |
          npm run typecheck
          npm run lint
          npm run test
      - name: Build the bundle
        run: |
          npm run update-version
          npm run build
      - name: Upload dist/sauna-card.js
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de # 2.11.5
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/sauna-card.js
          asset_name: sauna-card.js
          tag: ${{ github.event.release.tag_name }}
          overwrite: true
      # Enforce HACS plugin compliance now that the release asset exists. A
      # broken hacs.json or repository layout fails the release. The action ref
      # is pinned to a SHA, but note hacs/action runs the
      # ghcr.io/hacs/action:main container by its own design, so the validator
      # always uses the current HACS ruleset — which is what we want for a
      # release-time compliance gate (catch new HACS requirements at release).
      - name: Validate HACS manifest & structure
        uses: hacs/action@dcb30e72781db3f207d5236b861172774ab0b485 # pinned ref; image is :main by design
        with:
          category: "plugin"
